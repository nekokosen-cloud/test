<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#241710" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>平衡球</title>
  <link rel="stylesheet" href="css/style.css?v=20260703b" />
</head>
<body>
  <div id="app">
    <canvas id="game-canvas"></canvas>

    <div id="hud">
      <div class="hud-top">
        <div>
          <div class="title">平衡球</div>
          <div id="level-label" class="subtitle">第 1 关 · 入门托盘</div>
        </div>
        <div class="timer-box">
          <div class="timer-label">剩余</div>
          <div id="timer" class="timer-value">60</div>
        </div>
      </div>
      <div id="hint" class="hint">盘子固定，倾斜手机让钢球从起点滚进终点洞</div>
      <div id="version-tag" class="version-tag">v3 固定盘</div>
    </div>

    <div id="overlay" class="overlay visible">
      <div class="card">
        <h1 id="overlay-title">平衡球</h1>
        <p id="overlay-message">盘子固定不动。绿圈是起点，倾斜手机让钢球滚进终点洞口。</p>
        <div class="actions">
          <button id="secondary-btn" class="btn secondary hidden" type="button">重试</button>
          <button id="primary-btn" class="btn primary" type="button">开始游戏</button>
        </div>
        <p class="footnote">Safari 需点击按钮授权「动作与方向」传感器</p>
      </div>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
    }
  }
  </script>
  <script type="module" src="js/app.js?v=20260703b"></script>
</body>
</html>
